server:
  port: 8088
  error:
    whitelabel:
      enabled: false

spring:
  datasource:
    platform: MySQL

  driver-class-name: com.mysql.cj.jdbc.Driver # Это правильный современный драйвер
  url: jdbc:mysql://localhost:3306/lilubrary?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false
  username: root
  password: 1982
  # JPA properties
  jpa:
    hibernate:
      ddl-auto: update # When you launch the application for the first time - switch "none" at "create update"
    show-sql: true
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    # database-platform: org.hibernate.dialect.MySQL55Dialect
    #  open-in-view: false
    generate-ddl: true